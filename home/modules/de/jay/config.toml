gfx-api = "Vulkan"

show-bar = false
show-titles = false

keymap = """
  xkb_keymap {
    xkb_keycodes { include "evdev+aliases(qwerty)" };
    xkb_types    { include "complete"              };
    xkb_compat   { include "complete"              };
    xkb_symbols  { include "pc+se+inet(evdev)"     };
  };
  """

[[drm-devices]]
name = "twinkpad-integrated"
match = {
  pci-vendor = 0x1002,
  pci-model = 0x15d8
}
gfx-api = "OpenGl"

[[outputs]]
name = "twinktop-external-primary"
match.serial-number = "FA3T01940000"
x = 0
y = 560
mode = {
  width = 2560,
  height = 1440,
  refresh-rate = 180
}

[[outputs]]
name = "twinktop-external-secondary"
match.serial-number = "CA8A641301890"
x = 2560
y = 0
mode = {
  width = 2560,
  height = 1440,
  refresh-rate = 164.83
}
transform = "rotate-270"

# [[outputs]]
# name = "twinktop-external-tertiary"


[[inputs]]
name = "twinkpad-touchpad"
match.name = "SynPS/2 Synaptics TouchPad"
natural-scrolling = true
tap-drag-enabled = true
tap-drag-lock-enabled = true
tap-enabled = true

[complex-shortcuts.Print]
action = {
  type = "exec",
  exec = [
    "grim",
    "-g",
    "\"$(slurp)\"",
    "-",
    "|",
    "wl-copy",
    "-t",
    "image/png",
  ]
}

[complex-shortcuts.XF86AudioLowerVolume]
action = {
  exec = [
    "wpctl",
    "set-volume",
    "-l",
    "1.4",
    "@DEFAULT_AUDIO_SINK@",
    "5%-",
  ],
  type = "exec"
}

[complex-shortcuts.XF86AudioMicMute]
action = {
  type = "exec",
  exec = ["wpctl", "set-mute", "@DEFAULT_AUDIO_SOURCE@", "toggle"]
}

[complex-shortcuts.XF86AudioMute]
action = {
  type = "exec",
  exec = ["wpctl", "set-mute", "@DEFAULT_AUDIO_SINK@", "toggle"]
}

[complex-shortcuts.XF86AudioRaiseVolume]
action = {
  type = "exec",
  exec = [
      "wpctl",
      "set-volume",
      "-l",
      "1.4",
      "@DEFAULT_AUDIO_SINK@",
      "5%+",
  ]
}

[complex-shortcuts.XF86MonBrightnessDown]
action = {
  type = "exec",
  exec = ["blctl", "decrease", "10"]
}

[complex-shortcuts.XF86MonBrightnessUp]
action = {
  type = "exec",
  exec = ["blctl", "increase", "10"]
}

[shortcuts]
alt-F4 = "quit"
alt-h = "focus-left"
alt-j = "focus-down"
alt-k = "focus-up"
alt-l = "focus-right"
alt-q = "close"
alt-shift-h = "move-left"
alt-shift-j = "move-down"
alt-shift-k = "move-up"
alt-shift-l = "move-right"

